name: ci

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Compile
        run: yarn build

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test
        run: yarn test

  verify-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Verify WASM embedded in bundle
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found"
            exit 1
          fi
          if ! grep -q 'AGFzbQ' dist/index.js; then
            echo "ERROR: WASM binary (base64) not found in dist/index.js"
            echo "The build may have failed to embed the WASM module"
            exit 1
          fi
          echo "Verified: WASM binary is embedded (base64) in dist/index.js"

  publish:
    needs: [ compile, test, verify-package ]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          publish() {  # use latest npm to ensure OIDC support
            npx -y npm@latest publish "$@"
          }
          if [[ ${GITHUB_REF} == *alpha* ]]; then
            publish --access public --tag alpha
          elif [[ ${GITHUB_REF} == *beta* ]]; then
            publish --access public --tag beta
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              publish --access public --tag backport
            else
              publish --access public
            fi
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
