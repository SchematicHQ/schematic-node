# NOTE: This workflow is owned by us, not regenerated by Fern.
# It is listed in .fernignore so Fern's regeneration leaves it alone.
# Fern's default ci.yml has no way to inject the GH_TOKEN env required to
# download the rules engine WASM binary from the private schematic-api releases,
# so we maintain this file directly. If Fern's upstream template gains useful
# improvements, port them in manually.
name: ci

on: [push]

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Compile
        run: yarn build

  test:
    runs-on: ubuntu-latest

    # Real redis-server for tests/integration/redis-stores.test.ts — the only
    # place the credit-lease Lua scripts execute as actual Lua (the unit suite
    # runs them against a JS fake). The suite self-skips when TEST_REDIS_URL
    # is unset, so local `yarn test` needs no Redis.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test
        run: yarn test
        env:
          TEST_REDIS_URL: redis://localhost:6379

  verify-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Verify WASM ships with package
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found"
            exit 1
          fi
          if [ ! -f dist/wasm/rulesengine.js ]; then
            echo "ERROR: dist/wasm/rulesengine.js not found"
            exit 1
          fi
          # The .wasm binary is base64-inlined into rulesengine.js at build
          # time (see build.js inlineWasmBinary), so the standalone .wasm
          # is intentionally absent from dist/. Verify the inlining sentinel
          # is present instead — guards against a future build change that
          # silently reverts to the disk-loaded path.
          if ! grep -q "WASM binary inlined at build time" dist/wasm/rulesengine.js; then
            echo "ERROR: dist/wasm/rulesengine.js does not contain the inlined WASM sentinel"
            echo "The build may have failed to run inlineWasmBinary()"
            exit 1
          fi
          if [ -f dist/wasm/rulesengine_bg.wasm ]; then
            echo "ERROR: dist/wasm/rulesengine_bg.wasm should have been removed by inlineWasmBinary()"
            exit 1
          fi
          echo "Verified: WASM inlined into dist/wasm/rulesengine.js"

  publish:
    needs: [ compile, test, verify-package ]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download WASM binary
        run: ./scripts/download-wasm.sh

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          publish() {  # use latest npm to ensure OIDC support
            npx -y npm@latest publish "$@"
          }
          if [[ ${GITHUB_REF} == *alpha* ]]; then
            publish --access public --tag alpha
          elif [[ ${GITHUB_REF} == *beta* ]]; then
            publish --access public --tag beta
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              publish --access public --tag backport
            else
              publish --access public
            fi
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
